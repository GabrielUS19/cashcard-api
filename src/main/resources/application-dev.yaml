spring:
  datasource:
    url: "${DB_URL:jdbc:postgresql://localhost:5432/cash_card}"
    username: "${DB_USER:postgres}"
    password: "${DB_PASSWORD:postgres}"

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

api:
  security:
    token:
      secret: "${JWT_SECRET:secret}"