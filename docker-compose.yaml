services:
  db:
    image: postgres:17-alpine
    container_name: cashcard-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cash_card
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: